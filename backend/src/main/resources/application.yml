spring:
  application:
    name: deckgo-backend
  datasource:
    url: ${DECKGO_DB_URL:jdbc:postgresql://localhost:5432/deckgo}
    username: ${DECKGO_DB_USERNAME:postgres}
    password: ${DECKGO_DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:demo-key}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
      chat:
        completions-path: ${SPRING_AI_OPENAI_CHAT_COMPLETIONS_PATH:/v1/chat/completions}
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-5-mini}

management:
  endpoints:
    web:
      exposure:
        include: health,info

deckgo:
  contracts-dir: ${DECKGO_CONTRACTS_DIR:../contracts}
  renderer-base-url: ${DECKGO_RENDERER_BASE_URL:http://localhost:4301}
  artifacts-dir: ${DECKGO_ARTIFACTS_DIR:../var/artifacts}
  render-worker-delay-ms: ${DECKGO_RENDER_WORKER_DELAY_MS:5000}
  cors:
    allowed-origins: ${DECKGO_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai:
    fallback-enabled: ${DECKGO_AI_FALLBACK_ENABLED:true}
    workflow:
      discovery:
        enabled: ${DECKGO_AI_WORKFLOW_DISCOVERY_ENABLED:true}
        model: ${DECKGO_AI_WORKFLOW_DISCOVERY_MODEL:}
        temperature: ${DECKGO_AI_WORKFLOW_DISCOVERY_TEMPERATURE:0.4}
      research:
        enabled: ${DECKGO_AI_WORKFLOW_RESEARCH_ENABLED:true}
        model: ${DECKGO_AI_WORKFLOW_RESEARCH_MODEL:}
        temperature: ${DECKGO_AI_WORKFLOW_RESEARCH_TEMPERATURE:0.45}
      outline:
        enabled: ${DECKGO_AI_WORKFLOW_OUTLINE_ENABLED:true}
        model: ${DECKGO_AI_WORKFLOW_OUTLINE_MODEL:}
        temperature: ${DECKGO_AI_WORKFLOW_OUTLINE_TEMPERATURE:0.5}
      page-plan:
        enabled: ${DECKGO_AI_WORKFLOW_PAGE_PLAN_ENABLED:true}
        model: ${DECKGO_AI_WORKFLOW_PAGE_PLAN_MODEL:}
        temperature: ${DECKGO_AI_WORKFLOW_PAGE_PLAN_TEMPERATURE:0.55}
      svg-design:
        enabled: ${DECKGO_AI_WORKFLOW_SVG_DESIGN_ENABLED:true}
        model: ${DECKGO_AI_WORKFLOW_SVG_DESIGN_MODEL:}
        temperature: ${DECKGO_AI_WORKFLOW_SVG_DESIGN_TEMPERATURE:0.7}
